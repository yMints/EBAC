<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<div class="container">
    <h1>Calculadora de IMC</h1>

    <label for="peso">Digite o seu peso (kg):</label>
    <input type="number" id="peso" placeholder="Ex: 70.5" step="0.1">

    <label for="altura">Digite sua altura (m):</label>
    <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">

    <button onclick="calcularIMC()">Calcular</button>

    <p id="resultadoIMC">Seu IMC aparecerá aqui</p>
    <p id="classificacaoIMC"></p>
</div>

<script src="calcular.js"></script>

</body>
</html>
